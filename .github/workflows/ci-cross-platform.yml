# 跨平台 CI — 验证 Pangu Nebula 在 Windows / macOS / Linux 三平台上的兼容性
name: Cross-Platform CI

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'server/sdk/**'
      - 'launch.py'
      - 'scripts/**'
      - 'tests/**'
      - 'src-tauri/**'
      - '.github/workflows/ci-cross-platform.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'server/sdk/**'
      - 'launch.py'
      - 'scripts/**'
      - 'tests/**'
      - 'src-tauri/**'
      - '.github/workflows/ci-cross-platform.yml'
  workflow_dispatch:

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- 跨平台测试矩阵 ----------
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libgtk-3-0 libglib2.0-0 libwebkit2gtk-4.1-1 || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest
        env:
          NEBULA_TEST_PLATFORM: ${{ runner.os }}
        run: pytest tests/ -v --tb=short -k "not benchmark"

      - name: Run cross-platform tests
        if: runner.os != 'Windows'
        env:
          NEBULA_TEST_PLATFORM: ${{ runner.os }}
        run: pytest tests/test_cross_platform.py -v --tb=short

  # ---------- Tauri 构建验证 (仅 macOS / Linux, Windows 在 tauri-release 中) ----------
  verify-build:
    name: Verify Tauri build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Verify frontend dist exists
        run: |
          test -f frontend/dist/index.html && echo "Frontend build OK"