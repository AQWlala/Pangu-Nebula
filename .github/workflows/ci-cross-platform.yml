# 跨平台 CI - 验证 Pangu Nebula 在 Windows / macOS / Linux 三平台上的兼容性 (T4.7/T4.8)
name: Cross-Platform CI

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'pangu_memory_sdk/**'
      - 'launch.py'
      - 'pangu-nebula*.spec'
      - '.github/workflows/ci-cross-platform.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'pangu_memory_sdk/**'
      - 'launch.py'
      - 'pangu-nebula*.spec'
      - '.github/workflows/ci-cross-platform.yml'
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- 跨平台测试矩阵 ----------
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # 一个平台失败不取消其他平台
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          # WebKitGTK 4.1 required by Tauri 2 (v2.1.0 Phase 0+).
          # Also satisfies pywebview import tests (4.1 API compatible).
          sudo apt-get update || true
          sudo apt-get install -y libgtk-3-0 libglib2.0-0 libwebkit2gtk-4.1-1 || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest (with cross-platform marker)
        env:
          NEBULA_TEST_PLATFORM: ${{ runner.os }}
        run: pytest tests/ -v --tb=short -k "not benchmark"

      - name: Run cross-platform tests
        if: runner.os != 'Windows'
        env:
          NEBULA_TEST_PLATFORM: ${{ runner.os }}
        run: pytest tests/test_cross_platform.py -v --tb=short

  # ---------- macOS PyInstaller 打包测试 ----------
  build-macos:
    name: Build macOS (.app)
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (macOS spec)
        run: pyinstaller pangu-nebula-mac.spec --noconfirm

      - name: Verify .app bundle
        run: |
          test -d dist/PanguNebula.app && echo "macOS .app bundle exists"
          ls -la dist/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanguNebula-macOS
          path: dist/PanguNebula.app
          retention-days: 7

  # ---------- Linux PyInstaller 打包测试 ----------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libglib2.0-0 libwebkit2gtk-4.1-1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Linux spec)
        run: pyinstaller pangu-nebula-linux.spec --noconfirm

      - name: Verify binary
        run: |
          test -d dist/PanguNebula && echo "Linux binary exists"
          ls -la dist/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanguNebula-Linux
          path: dist/PanguNebula
          retention-days: 7

  # ---------- Spec 文件语法校验 (不实际打包, 只验证 spec 文件存在且可解析) ----------
  spec-validation:
    name: Validate spec files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spec files exist
        run: |
          test -f pangu-nebula.spec && echo "Windows spec OK"
          test -f pangu-nebula-mac.spec && echo "macOS spec OK"
          test -f pangu-nebula-linux.spec && echo "Linux spec OK"

      - name: Validate spec syntax (Python parse)
        run: |
          python -c "import ast; ast.parse(open('pangu-nebula.spec').read()); print('Windows spec syntax OK')"
          python -c "import ast; ast.parse(open('pangu-nebula-mac.spec').read()); print('macOS spec syntax OK')"
          python -c "import ast; ast.parse(open('pangu-nebula-linux.spec').read()); print('Linux spec syntax OK')"
