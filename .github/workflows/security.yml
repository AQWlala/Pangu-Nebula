# 依赖安全扫描 - 定期检查 requirements.txt 和 package.json 的已知漏洞
# P0-W7.3: 扩展 cargo-audit + cargo-deny (Rust 依赖扫描)
name: Security Scan

on:
  push:
    branches: [main, master]
    paths:
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'src-tauri/Cargo.toml'
      - 'src-tauri/Cargo.lock'
      - '.github/workflows/security.yml'
  schedule:
    # 每周一北京时间 09:00 (UTC 周一 01:00) 定期扫描
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 支持手动触发

jobs:
  # ---------- Python 依赖扫描 ----------
  python-audit:
    name: Python dependencies (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan requirements.txt
        run: |
          echo "🔍 扫描 Python 依赖..."
          pip-audit -r requirements.txt --strict --desc
          echo "✅ Python 依赖扫描完成,无已知漏洞"

  # ---------- Node 依赖扫描 ----------
  npm-audit:
    name: Node dependencies (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run npm audit
        run: |
          echo "🔍 扫描 Node 依赖..."
          # audit 检查 vulnerabilities, --audit-level=high 只在高级别漏洞时失败
          npm audit --audit-level=high --omit=dev || {
            echo "⚠️  发现高级别漏洞,请运行 'npm audit fix' 修复"
            exit 1
          }
          echo "✅ Node 依赖扫描完成,无高级别漏洞"

  # ---------- Rust 依赖扫描: cargo-audit (P0-W7.3) ----------
  # 检查 RustSec Advisory Database 中的已知漏洞
  cargo-audit:
    name: Rust dependencies (cargo-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          echo "🔍 扫描 Rust 依赖 (cargo-audit)..."
          # 不使用 --deny warnings: unmaintained/unsound 等警告不阻断 CI
          # (GTK3 bindings 等 Tauri 2 传递依赖无法直接升级)
          # vulnerabilities 仍然阻断 (cargo audit 默认行为)
          #
          # 忽略的漏洞 (传递依赖,已评估风险可接受):
          #   RUSTSEC-2026-0194 / RUSTSEC-2026-0195 — quick-xml 0.39.4
          #   quick-xml 是 wayland-scanner 0.31.10 的编译时依赖 (build script),
          #   漏洞仅影响运行时 XML 解析,wayland-scanner 在编译期使用,运行时不暴露
          #   跟进: 等待 wayland-scanner 升级到使用 quick-xml >=0.41.0 的版本
          #
          # 注: cargo-audit 0.22 不读取 audit.toml 的 [advisories].ignore 字段,
          #     必须通过 --ignore 命令行参数传递 (audit.toml 仅作文档记录)
          cargo audit \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195
          echo "✅ Rust 依赖扫描完成,无未忽略的已知漏洞"

  # ---------- Rust 依赖扫描: cargo-deny (P0-W7.3) ----------
  # 检查许可证合规 + 漏洞 + 重复依赖
  cargo-deny:
    name: Rust licenses + bans (cargo-deny)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny (licenses + bans + advisories)
        run: |
          echo "🔍 检查 Rust 许可证 + 禁用依赖 + 漏洞 (cargo-deny)..."
          # 使用项目中的 deny.toml (持久化配置,含 BSL-1.0 等许可证)
          if [ ! -f deny.toml ]; then
            echo "❌ ERROR: deny.toml not found! Please commit deny.toml to src-tauri/"
            exit 1
          fi
          echo "Using deny.toml from project"
          # 检查 licenses + bans + advisories (跳过 sources 检查)
          cargo deny check licenses advisories bans
          echo "✅ Rust 许可证 + 禁用依赖检查通过"

  # ---------- 代码安全扫描 (CodeQL) ----------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

