# 依赖安全扫描 - 定期检查 requirements.txt 和 package.json 的已知漏洞
name: Security Scan

on:
  push:
    branches: [main, master]
    paths:
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/security.yml'
  schedule:
    # 每周一北京时间 09:00 (UTC 周一 01:00) 定期扫描
    - cron: '0 1 * * 1'
  workflow_dispatch:  # 支持手动触发

jobs:
  # ---------- Python 依赖扫描 ----------
  python-audit:
    name: Python dependencies (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan requirements.txt
        run: |
          echo "🔍 扫描 Python 依赖..."
          pip-audit -r requirements.txt --strict --desc
          echo "✅ Python 依赖扫描完成,无已知漏洞"

  # ---------- Node 依赖扫描 ----------
  npm-audit:
    name: Node dependencies (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run npm audit
        run: |
          echo "🔍 扫描 Node 依赖..."
          # audit 检查 vulnerabilities, --audit-level=high 只在高级别漏洞时失败
          npm audit --audit-level=high --omit=dev || {
            echo "⚠️  发现高级别漏洞,请运行 'npm audit fix' 修复"
            exit 1
          }
          echo "✅ Node 依赖扫描完成,无高级别漏洞"

  # ---------- 代码安全扫描 (CodeQL) ----------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
