# cargo-audit 配置 (P0-W7.3 Security Scan)
# 文档: https://github.com/rustsec/cargo-audit/blob/master/audit.toml.example

[advisories]
# 忽略的 advisory ID 列表 (需附注释说明原因 + 跟进计划)
ignore = [
    # quick-xml 0.39.4 — wayland-scanner 0.31.10 的编译时依赖 (build script)
    # 漏洞仅影响运行时 XML 解析,wayland-scanner 在编译期使用,运行时不暴露
