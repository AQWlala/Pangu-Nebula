# cargo-deny 配置 — Rust 依赖许可证 + 禁用 + 漏洞检查
# P0-W7.3: 用于 security.yml cargo-deny job
# 注意: 此文件为项目持久化配置,CI 中不再动态生成

[licenses]
# 允许的开源许可证
allow = [
    "MIT",
    "Apache-2.0",
    # Apache-2.0 WITH LLVM-exception — target-lexicon 0.12.16 使用
    # (cranelift / target-lexicon 的标准许可证,OSI approved)
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    # BSL-1.0 (Boost Software License) — clipboard-win / error-code 使用
    # OSI approved, FSF Free/Libre, 兼容开源
    "BSL-1.0",
    # CDLA-Permissive-2.0 — webpki-root-certs 1.0.8 使用
    # (tauri-plugin-updater 传递依赖,数据许可证,允许使用/分发/修改)
    "CDLA-Permissive-2.0",
]
# 置信度阈值 (licenses.confidence-threshold)
confidence-threshold = 0.8

[bans]
# 允许重复依赖 (某些 crate 有多版本是正常的)
multiple-versions = "warn"
# 允许 wildcard 依赖
wildcards = "allow"

[advisories]
# unmaintained 检查范围:
#   "all" = 检查所有依赖 (默认,但 Tauri 2 GTK3/unic-* 传递依赖会报错)
#   "workspace" = 只检查 workspace 直接依赖
#   "none" = 不检查 unmaintained
# Tauri 2 的 GTK3 bindings + unic-* 系列均为传递依赖,无法直接升级
unmaintained = "workspace"
# 忽略的漏洞 ID (传递依赖漏洞,已评估风险可接受)
ignore = [
    # quick-xml 0.39.4 — wayland-scanner 0.31.10 编译时依赖,运行时不暴露
    # 跟进: 等待 wayland-scanner 升级到 quick-xml >=0.41.0
    "RUSTSEC-2026-0194",  # quick-xml: Quadratic run time (high 7.5)
    "RUSTSEC-2026-0195",  # quick-xml: Unbounded namespace-declaration DoS (high 7.5)
]
# 漏洞数据库 URL
db-urls = ["https://github.com/rustsec/advisory-db"]
